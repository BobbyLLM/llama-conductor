<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}llama-conductor</title>
  <meta name="google-site-verification" content="X-oVkpKrZtcgUicays4QvguYOmD5x98mby9rVN5yx10" />
  <link rel="alternate" type="application/rss+xml" title="llama-conductor RSS" href="https://bobbyllm.codeberg.page/llama-conductor/feed.xml">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}?v={{ site.time | date: '%s' }}">
</head>
<body>
  <div class="bg-grid"></div>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">llama-conductor</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </header>
  <main class="wrap">
    <article class="card prose">
      {{ content }}
    </article>
  </main>
  <script>
    (function () {
      var root = document.querySelector(".prose");
      if (!root) return;

      // Kramdown can treat "Confidence: ... | Source: ..." as a table row.
      // Normalize those tiny two-cell tables back to inline text.
      root.querySelectorAll("table").forEach(function (tbl) {
        if (tbl.querySelector("th")) return;
        var cells = Array.from(tbl.querySelectorAll("td")).map(function (td) {
          return (td.textContent || "").trim();
        });
        if (cells.length === 2 && /^Confidence:/i.test(cells[0]) && /^Source:/i.test(cells[1])) {
          var p = document.createElement("p");
          p.textContent = cells[0] + " | " + cells[1];
          tbl.replaceWith(p);
        }
      });

      var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      var nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);

      var urlRe = /https?:\/\/[^\s<>"']+/g;
      function shouldSkip(node) {
        var p = node.parentElement;
        while (p) {
          var t = p.tagName;
          if (t === "A" || t === "CODE" || t === "PRE" || t === "SCRIPT" || t === "STYLE") return true;
          p = p.parentElement;
        }
        return false;
      }

      function trimTrailing(url) {
        var trimmed = url;
        while (/[),.!?;:]$/.test(trimmed)) trimmed = trimmed.slice(0, -1);
        return { clean: trimmed, tail: url.slice(trimmed.length) };
      }

      nodes.forEach(function (node) {
        if (!node.nodeValue || shouldSkip(node)) return;
        var text = node.nodeValue;
        urlRe.lastIndex = 0;
        if (!urlRe.test(text)) return;
        urlRe.lastIndex = 0;

        var frag = document.createDocumentFragment();
        var last = 0;
        var m;
        while ((m = urlRe.exec(text)) !== null) {
          var start = m.index;
          var raw = m[0];
          var parts = trimTrailing(raw);
          if (start > last) frag.appendChild(document.createTextNode(text.slice(last, start)));
          var a = document.createElement("a");
          a.href = parts.clean;
          a.textContent = parts.clean;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          frag.appendChild(a);
          if (parts.tail) frag.appendChild(document.createTextNode(parts.tail));
          last = start + raw.length;
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        node.parentNode.replaceChild(frag, node);
      });
    })();
  </script>
</body>
</html>

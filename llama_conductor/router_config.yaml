# router_config.yaml
# version 1.6.0

# Backend upstream configuration.
# `provider` controls START-2 launcher behavior:
# - llama_cpp: launch local llama-server and route via configured local port
# - vllm|ollama: do not launch local llama-server; use external upstream URLs
# - custom: fully external backend, launcher skips upstream readiness checks
backend:
  provider: "llama_cpp"  # llama_cpp|vllm|ollama|custom
  local_llama_port: 8010
  upstream_base_url: "http://127.0.0.1:8010"
  upstream_chat_url: "http://127.0.0.1:8010/v1/chat/completions"
  llama_cpp:
    # Personal/local launcher defaults (used by launch_stack.py).
    # CLI args can override any of these at runtime.
    exe_path: "C:/Users/bobbyp330/Downloads/llamacuda/llama-server.exe"
    models_dir: "C:/Users/bobbyp330/Downloads/LLMs"
    models_preset_path: "C:/Users/bobbyp330/Downloads/LLMs/llama-router-models.ini"
    host: "0.0.0.0"
    port: 8010
    ctx_size: 8192
    threads: 12
    threads_batch: 12
    keep: 96
    batch_size: 512
    ubatch_size: 256
    parallel: 1

# Deprecated compatibility key (still read as fallback by config.py).
# Prefer backend.upstream_chat_url for all new configs.
llama_swap_url: "http://127.0.0.1:8010/v1/chat/completions"

# Router bind port (when running `python router_fastapi.py`)
port: 9000

# Router diagnostics (privacy-safe defaults).
router:
  debug: false
  debug_log_user_text: false
  image_emitter:
    enabled: false

# Frontend launch toggles (used by START-2.bat).
frontend:
  shim:
    # true: launch shim_server.py on startup (llama.cpp WebUI + auth + rewrite layer)
    # false: do not launch shim, use router/backend directly
    enabled: true
    host: "0.0.0.0"
    port: 8088
    # true: inject shim toolbar/scripts into WebUI responses
    # false: proxy without UI script injection
    inject_ui: true
    auth_user: ""
    auth_password: ""
    force_vision: true
    render_mode: "buffered"  # stream|buffered
    ui_model_alias: "MOA"
    router_model_id: "moa-router"
    single_instance: true
    takeover_existing: true
    takeover_foreign: true
    takeover_timeout_s: 5.0

# Launcher orchestration defaults (used by launch_stack.py).
launcher:
  router_host: "0.0.0.0"
  ready_timeout_s: 22
  auto_clean_before_start: true

# llama-server router-mode preset generation.
# This drives startup-time generation of the models-preset INI consumed by llama-server.
llama_server:
  models_preset:
    enabled: true
    defaults:
      c: 8192
    models:
      Qwen3VL-4B-Instruct-Q4_K_M:
        mmproj: "C:/Users/bobbyp330/Downloads/LLMs/mmproj-Qwen3VL-4B-Instruct-Q8_0.gguf"

# Model role mapping (router passes `role=`; call_model resolves to these model IDs).
roles:
  thinker: "Qwen3-4B-Hivemind-Inst-Q4_K_M-imat"
  critic: "Phi-4-mini-instruct-Q4_K_M"
  vision: "Qwen3VL-4B-Instruct-Q4_K_M"
  coder: "Qwen3-4B-Hivemind-Inst-Q4_K_M-imat"
  second_op: "Nanbeige4-3B-Thinking-2511-Q4_K_M"
  judge: "Phi-4-mini-instruct-Q4_K_M"
  clinical: "qwen2.5-1.5b-instruct-q4_0"  # Used for >>cliniko review

# Vault is Qdrant-only; Mentats uses this kb label when searching Qdrant.
vault_kb_name: "vault"

# Filesystem KB folders.
# These are *not* Qdrant. They are folders containing raw docs + SUMM_*.md files.
kb_paths:
  c64: "C:/docs/c64"
  amiga: "C:/docs/amiga"
  dogs: "C:/docs/dogs"

# Optional RAG settings (rag.py is still using its own defaults in v1.0.3).
rag:
  qdrant_host: "localhost"
  qdrant_port: 6333
  collection: "moa_kb_docs"
  vector_name: "e5_small_v2"

# Vodka settings (overrides vodka_filter.py defaults)
vodka:
  # Presets reduce knob-soup; explicit keys below still override preset values.
  # fast|balanced|max-recall
  preset: "balanced"
  storage_dir: "."  # empty = cwd, or set explicit path
  subdir: "vodka"   # writes Vodka artifacts under total_recall/vodka
  base_ttl_days: 3
  touch_extension_days: 5
  max_touches: 2
  debug: false
  debug_dir: "."
  n_last_messages: 12
  keep_first: false
  max_chars: 6000
  enable_summary: true
  summary_segments_per_message: 8

footer:
  profile:
    enabled: true
    # always|non_default|debug
    mode: "non_default"

# Deterministic state-transition reasoning router.
# Phase 1 scope: bounded capacity / transfer family.
state_solver:
  enabled: true
  auto_route: true
  apply_in_raw: false

# Vault chunking (for >>move to vault ingestion)
vault:
  chunk_words: 250        # Smaller chunks = better semantic matching for queries
  chunk_overlap_words: 50  # Overlap prevents losing context at chunk boundaries

# Cliniko sidecar (staged clinical note pipeline)
# >>cliniko compact: Compress 20KB+ RAW notes to ~6KB
# >>cliniko generate: LLM generates management plan draft
# >>cliniko sanitize: Deterministic cleanup (future)
# >>cliniko review: LLM polish with validation (v2.3)
cliniko:
  debug: false
  debug_payload: false  # keep payloads out of console unless explicitly enabled
  
  # Step 1: Compaction settings
  compact:
    min_chars_trigger: 1800    # Only compact if input > this
    max_out_chars: 7000         # Target output size (tested at 6287 chars from 21KB input)
    max_out_lines: 400          # Hard cap on output lines
    include_stats_header: true  # Prepend COMPACTED_STATS to user message
  
  # Step 2: LLM generation settings (UNCHANGED FROM ORIGINAL)
  generate:
    # Role key from `roles:` mapping above (NOT a model name)
    model_role: "clinical"
    max_tokens: 2000            # V2.5 SLIM optimized for 8K context window
    temperature: 0.2            # Low temp for clinical consistency
    top_p: 0.9
    # Use forward slashes to avoid YAML escape issues on Windows
    prompt_path: "C:/moa-router1.1.6 LOCAL/llama_conductor/CLINIKO-prompt.md"
  
  # Step 3: Sanitization settings (future)
  sanitize:
    enforce_must_not_miss: true
    strip_structural_claims: true
    strip_invented_metrics: true
  
  # Step 4: LLM review with validation (NEW in v2.3)
  review:
    model_role: "clinical"  # Use dedicated clinical role for review
    max_tokens: 1400
    temperature: 0.3
    top_p: 0.9

# Mentats diagnostics (off by default; payload logging opt-in).
mentats:
  debug: false
  debug_payload: false

# Scratchpad sidecar (ephemeral session-grounding)
scratchpad:
  storage_dir: "."         # base dir for total_recall/session_kb
  max_entries: 12          # max captures retained per session file
  max_capture_chars: 12000 # per-capture hard clip
  top_k: 3                 # retrieval hits merged into facts block
  max_chars: 1200          # max chars contributed to facts block
  max_age_minutes: 60      # hard expiry; pruned on scratchpad access
  exhaustive_response_mode: "raw"  # raw|llm; raw bypasses LLM for "all facts/everything" intents

# KAIOKEN v2 phase 0 (telemetry-only, fail-open).
kaioken:
  enabled: true
  mode: "log_only"          # phase0: log_only (no coercion)
  log_all_routes: true      # log model + exempt routes with suppression reason
  session_hash_salt: "kaioken-v1"

# Temporary upstream watchdog (remove later if desired).
# Writes `total_recall/upstream_watchdog.jsonl` for router/upstream health transitions.
watchdog:
  enabled: true
  interval_seconds: 10
  heartbeat_seconds: 60
  http_timeout_seconds: 10
  tcp_timeout_seconds: 1.5
